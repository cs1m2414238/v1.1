<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Competitive Programming Stats Panel</title>
    <style>
        :root {
            --bg-color: #0d0e0d;
            --panel-bg: rgba(20, 24, 20, 0.6);
            --border-color: #2b332b;
            --text-muted: #5d665d;
            
            /* Metric Colors */
            --orange-main: #f0a92e;
            --green-main: #24d14c;
            --blue-main: #2ebef0;
            --red-main: #ef3e36;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            width: 100%;
            max-width: 1100px;
            background-color: #070907;
            border: 1px solid var(--border-color);
            padding: 24px;
            border-radius: 4px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
        }

        /* Header Navigation */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            margin-bottom: 24px;
        }

        .title-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .orange-dot {
            width: 8px;
            height: 8px;
            background-color: var(--orange-main);
            border-radius: 50%;
            display: inline-block;
        }

        .panel-title {
            font-size: 14px;
            letter-spacing: 2px;
            font-weight: bold;
            color: var(--orange-main);
        }

        .panel-subtitle {
            font-size: 14px;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .user-info {
            font-size: 12px;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .user-info span {
            color: var(--green-main);
            font-weight: bold;
        }

        /* Platform Tabs */
        .tabs {
            display: flex;
            gap: 24px;
            margin-bottom: 20px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .tab {
            color: var(--text-muted);
            cursor: pointer;
            padding-bottom: 4px;
            position: relative;
        }

        .tab.active {
            color: var(--orange-main);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -4px;
            width: calc(100% + 8px);
            height: 2px;
            background-color: var(--orange-main);
        }

        /* Top 4 Summary Cards */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
            text-align: center;
        }

        .stat-value {
            font-size: 26px;
            font-weight: bold;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .stat-label {
            font-size: 9px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Value color overrides */
        .val-orange { color: var(--orange-main); }
        .val-green { color: var(--green-main); }
        .val-blue { color: var(--blue-main); }

        /* Main Content Layout splits Split Columns */
        .main-content {
            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .panel-box {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 20px;
        }

        .box-header {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* Left Panel Circular Display elements */
        .circles-container {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 0;
        }

        .circle-wrapper {
            text-align: center;
        }

        .progress-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 12px;
        }

        /* Simulated ring layers using shadow ring outlines */
        .progress-circle::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .circle-easy { border: 4px solid #143a1c; border-left-color: var(--green-main); border-top-color: var(--green-main); }
        .circle-medium { border: 4px solid #423013; border-left-color: var(--orange-main); border-top-color: var(--orange-main); }
        .circle-hard { border: 4px solid #3d1614; border-left-color: var(--red-main); }

        .circle-val {
            font-size: 18px;
            font-weight: bold;
        }
        .circle-total {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .circle-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .lbl-easy { color: #1a8734; }
        .lbl-medium { color: #b57a1b; }
        .lbl-hard { color: #b82a23; }

        /* Right Panel Row Progress Bars */
        .bar-row {
            margin-bottom: 18px;
        }
        .bar-info {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .bar-label {
            font-weight: bold;
        }
        .bar-count {
            color: var(--text-muted);
        }
        .bar-count span {
            color: #ffffff;
        }
        .bar-bg {
            width: 100%;
            height: 8px;
            background-color: #121512;
            border-radius: 4px;
            overflow: hidden;
        }
        .bar-fill {
            height: 100%;
            border-radius: 4px;
        }
        .fill-easy { background-color: var(--green-main); width: 47%; }
        .fill-medium { background-color: var(--orange-main); width: 17%; }
        .fill-hard { background-color: var(--red-main); width: 6%; }

        /* Meta details fields inside right panel */
        .meta-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid rgba(43, 51, 43, 0.4);
            padding-top: 12px;
            margin-top: 16px;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .meta-label {
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .meta-val-blue {
            color: var(--blue-main);
            font-weight: bold;
        }
        .meta-val-orange {
            color: var(--orange-main);
            font-weight: bold;
        }

        /* Heatmap Submission Matrix Row */
        .heatmap-box {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 16px 20px;
        }
        .heatmap-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .heatmap-cell {
            width: 11px;
            height: 11px;
            background-color: #111;
            border-radius: 1px;
            flex-shrink: 0;
        }
        /* Fill variances for cells */
        .cell-0 { background-color: #101410; border: 1px solid #192019; }
        .cell-1 { background-color: #0e3a15; }
        .cell-2 { background-color: #105c1f; }
        .cell-3 { background-color: #199432; }
        .cell-4 { background-color: var(--green-main); }
    </style>
</head>
<body>

        </div>

    <div class="tabs">
